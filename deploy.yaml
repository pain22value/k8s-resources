apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: truve-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/minjeongjun/k8s-resources.git
    targetRevision: HEAD
    path: app
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
